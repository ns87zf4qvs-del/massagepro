<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Наши соцсети</title>
    <!-- Google Fonts + Font Awesome -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            /* Фоновое изображение */
            background-image: url('https://avatars.mds.yandex.net/get-ydo/5490072/2a0000019233f270ec77b2d4b1b2f770ea94/diploma');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
        }

        /* Затемняющий слой для контраста */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.6); /* чуть темнее для белого текста */
            z-index: 0;
        }

        .card {
            position: relative;
            z-index: 1;
            max-width: 800px;
            width: 100%;
            background: transparent;         /* Полностью прозрачный фон */
            backdrop-filter: blur(12px);     /* Лёгкое размытие фона позади */
            -webkit-backdrop-filter: blur(12px);
            border-radius: 48px;
            padding: 40px 30px;
            /* Убираем белую заливку и границу */
            border: none;
            box-shadow: none;
            transition: all 0.2s ease;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 600;
            color: white;                   /* Белый текст */
            text-align: center;
            margin-bottom: 8px;
            letter-spacing: -0.02em;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
        }

        .subtitle {
            text-align: center;
            color: rgba(255, 255, 255, 0.9); /* Полупрозрачный белый */
            font-size: 1rem;
            margin-bottom: 40px;
            border-bottom: 2px dashed rgba(255, 255, 255, 0.3);
            padding-bottom: 20px;
            font-weight: 500;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.4);
        }

        .social-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 18px;
            margin-bottom: 40px;
        }

        .social-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: transparent;        /* Прозрачный фон */
            border-radius: 28px;
            padding: 22px 8px;
            text-decoration: none;
            color: white;                   /* Белый текст */
            font-weight: 500;
            font-size: 0.95rem;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.4); /* Полупрозрачная белая обводка */
            transition: all 0.25s ease;
            gap: 12px;
            text-align: center;
            backdrop-filter: blur(4px);      /* Лёгкое размытие на кнопках */
            -webkit-backdrop-filter: blur(4px);
            text-shadow: 0 2px 5px rgba(0, 0, 0, 0.5);
        }

        .social-btn i {
            font-size: 2.2rem;
            filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.5));
        }

        .social-btn span {
            background: rgba(0, 0, 0, 0.2);  /* Лёгкий тёмный фон под текстом для читаемости */
            padding: 5px 8px;
            border-radius: 40px;
            width: 100%;
            text-align: center;
            backdrop-filter: blur(2px);
        }

        .social-btn:hover {
            transform: translateY(-6px);
            border-color: white;              /* Яркая обводка при наведении */
            background: rgba(0, 0, 0, 0.2);   /* Слегка затемняется фон */
            box-shadow: 0 20px 25px -8px black;
        }

        /* Индивидуальные цвета иконок при наведении (оставляем как есть) */
        .social-btn.vk:hover i { color: #2787F5; }
        .social-btn.tg:hover i { color: #26A5E4; }
        .social-btn.ig:hover i { color: #d62976; }
        .social-btn.wa:hover i { color: #25D366; }
        .social-btn.max:hover i { color: #0066FF; }

        .action-block {
            display: flex;
            justify-content: center;
        }

        .primary-btn {
            background: rgba(30, 42, 65, 0.8); /* Полупрозрачный тёмный фон */
            color: white;
            border: none;
            border-radius: 50px;
            padding: 18px 60px;
            font-size: 1.4rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            cursor: pointer;
            box-shadow: 0 20px 30px -10px rgba(0, 0, 0, 0.5);
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            border: 1px solid rgba(255,255,255,0.2);
            text-decoration: none;
            backdrop-filter: blur(4px);
        }

        .primary-btn i {
            font-size: 1.4rem;
            filter: drop-shadow(0 2px 4px black);
        }

        .primary-btn:hover {
            background: rgba(44, 61, 94, 0.9);
            transform: scale(1.02);
            box-shadow: 0 25px 35px -8px black;
        }

        @media (max-width: 600px) {
            .card { padding: 30px 18px; }
            h1 { font-size: 1.8rem; }
            .social-grid { grid-template-columns: repeat(2, 1fr); }
            .primary-btn { padding: 16px 30px; font-size: 1.2rem; }
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Наши соцсети</h1>
        <div class="subtitle">Подписывайтесь и оставайтесь на связи</div>

        <div class="social-grid">
            <!-- Вконтакте -->
            <a href="https://vk.ru/probalance_ufa" target="_blank" rel="noopener" class="social-btn vk">
                <i class="fab fa-vk"></i>
                <span>Вконтакте</span>
            </a>
            <!-- Telegram -->
            <a href="https://t.me/probalanceee" target="_blank" rel="noopener" class="social-btn tg">
                <i class="fab fa-telegram-plane"></i>
                <span>Telegram</span>
            </a>
            <!-- Instagram -->
            <a href="https://www.instagram.com/probakance_ufa" target="_blank" rel="noopener" class="social-btn ig">
                <i class="fab fa-instagram"></i>
                <span>Instagram</span>
            </a>
            <!-- WhatsApp -->
            <a href="https://wa.me/79961003460" target="_blank" rel="noopener" class="social-btn wa">
                <i class="fab fa-whatsapp"></i>
                <span>WhatsApp</span>
            </a>
            <!-- MAX -->
            <a href="https://max.ru/u/79961003460" target="_blank" rel="noopener" class="social-btn max">
                <i class="fas fa-comment"></i>
                <span>MAX</span>
            </a>
        </div>

        <div class="action-block">
            <!-- Запись -->
            <a href="https://n2023830.yclients.com/company/1777023/personal/select-time?o=m-1" class="primary-btn" target="_blank" rel="noopener">
                <i class="fas fa-calendar-check"></i> Записаться
            </a>
        </div>
    </div>
</body>
</html>
